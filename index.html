<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS - CV Tanpa Foto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        .a4-paper {
            width: 210mm;
            min-height: 297mm;
            background: white;
            box-shadow: 0 25px 50px -12px rgb(15 23 42 / 0.15);
            margin: 30px auto;
            padding: 15mm 16mm;
            font-family: 'Inter', system-ui, sans-serif;
            font-size: 11pt;
            line-height: 1.72;
            color: #1f2937;
            position: relative;
            box-sizing: border-box;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; margin: 0; padding: 0; }
            .preview-wrapper {
                display: block !important;
                background: white !important;
                padding: 0 !important;
                margin: 0 !important;
                box-shadow: none !important;
            }
            .a4-paper {
                width: 210mm !important;
                min-height: 297mm !important;
                margin: 0 auto !important;
                padding: 15mm 16mm !important;
                box-shadow: none !important;
                page-break-after: always;
            }
            .section-title { page-break-inside: avoid; }
        }

        @page { size: A4 portrait; margin: 0; }

        .section-title {
            font-size: 13.5pt;
            font-weight: 700;
            color: #1e2937;
            margin-bottom: 9px;
            padding-bottom: 6px;
            border-bottom: 2.5px solid #1e2937;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <!-- NAVBAR -->
    <nav class="bg-slate-950 text-white sticky top-0 z-50 no-print shadow-md">
        <div class="max-w-screen-2xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <i class="fa-solid fa-file-lines text-3xl text-emerald-400"></i>
                <div>
                    <h1 class="text-2xl font-semibold tracking-tight">ATS SYSTEM</h1>
                    <p class="text-xs text-slate-400 -mt-0.5">V.5.6 - Tanpa Foto</p>
                </div>
            </div>
            
            <div class="flex items-center gap-x-3 text-sm">
                <button onclick="autoSaveDraft()" class="flex items-center gap-x-2 px-5 h-10 bg-white/10 hover:bg-white/20 rounded-2xl font-medium">
                    <i class="fa-solid fa-floppy-disk"></i> <span class="hidden md:inline">Simpan Draft</span>
                </button>
                <button onclick="saveAsImage()" class="flex items-center gap-x-2 px-5 h-10 bg-violet-600 hover:bg-violet-700 text-white rounded-2xl font-medium">
                    <i class="fa-solid fa-image"></i> <span class="hidden sm:inline">PNG</span>
                </button>
                <button onclick="generatePDF()" class="flex items-center gap-x-2 px-6 h-10 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl font-medium">
                    <i class="fa-solid fa-file-pdf"></i> <span>PDF ATS</span>
                </button>
                <button onclick="printLetter()" class="flex items-center gap-x-2 px-6 h-10 bg-white text-slate-950 hover:bg-slate-100 rounded-2xl font-medium">
                    <i class="fa-solid fa-print"></i> <span>Cetak</span>
                </button>
                <button onclick="clearForm()" class="flex items-center justify-center w-10 h-10 text-red-400 hover:text-red-500 rounded-2xl">
                    <i class="fa-solid fa-trash text-xl"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto px-6 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- FORM INPUT -->
            <div class="lg:col-span-5 bg-white rounded-3xl shadow-xl p-8 no-print overflow-auto max-h-screen">
                <div class="mb-8">
                    <h2 class="text-2xl font-semibold text-slate-800">CV ATS Profesional v5.6</h2>
                    <p class="text-emerald-600 text-sm mt-1">Versi Tanpa Foto</p>
                </div>
                
                <div class="space-y-10">
                    <!-- Data Diri -->
                    <div>
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-4">Data Diri</h3>
                        <input id="nama" type="text" value="Muhammad Hafis" placeholder="Nama Lengkap" 
                               class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none mb-4" oninput="updatePreview()">
                        
                        <div class="grid grid-cols-2 gap-4">
                            <input id="telepon" type="tel" value="0856-1234-5678" placeholder="No. Telepon" 
                                   class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()">
                            <input id="email" type="email" value="hafis@example.com" placeholder="Email" 
                                   class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()">
                        </div>
                        <input id="alamat" type="text" value="Paninggaran, Pekalongan, Jawa Tengah" placeholder="Domisili / Alamat" 
                               class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none mt-4" oninput="updatePreview()">
                        <input id="linkedin" type="text" value="linkedin.com/in/hafis" placeholder="LinkedIn / GitHub" 
                               class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none mt-3" oninput="updatePreview()">
                    </div>

                    <!-- Ringkasan Profesional -->
                    <div>
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-4">Ringkasan Profesional</h3>
                        <textarea id="ringkasan" rows="4" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" 
                                  oninput="updatePreview()">Fresh Graduate Teknik Jaringan Komputer dan Telekomunikasi yang kompeten di bidang IT Support, administrasi jaringan, dan troubleshooting.</textarea>
                    </div>

                    <!-- Pengalaman Kerja -->
                    <div>
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-3">Pengalaman Kerja</h3>
                        <div id="pengalaman-container" class="space-y-4"></div>
                        <button onclick="tambahPengalaman()" class="mt-3 flex items-center gap-2 text-emerald-600 hover:text-emerald-700 text-sm font-medium">
                            <i class="fa-solid fa-plus"></i> Tambah Pengalaman Kerja
                        </button>
                    </div>

                    <!-- Pengalaman Magang -->
                    <div>
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-3">Pengalaman Magang</h3>
                        <div id="magang-container" class="space-y-4"></div>
                        <button onclick="tambahMagang()" class="mt-3 flex items-center gap-2 text-emerald-600 hover:text-emerald-700 text-sm font-medium">
                            <i class="fa-solid fa-plus"></i> Tambah Pengalaman Magang
                        </button>
                    </div>

                    <!-- Pendidikan -->
                    <div>
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-3">Pendidikan</h3>
                        <div id="pendidikan-container" class="space-y-4"></div>
                        <button onclick="tambahPendidikan()" class="mt-3 flex items-center gap-2 text-emerald-600 hover:text-emerald-700 text-sm font-medium">
                            <i class="fa-solid fa-plus"></i> Tambah Pendidikan
                        </button>
                    </div>

                    <!-- Keterampilan -->
                    <div>
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-4">Keterampilan</h3>
                        <textarea id="keterampilan" rows="6" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" 
                                  oninput="updatePreview()">• Microsoft Office (Word, Excel, PowerPoint)
• Administrasi dan Konfigurasi Jaringan Komputer
• HTML, CSS, Tailwind CSS, JavaScript Dasar
• Troubleshooting Hardware & Software
• Instalasi Perangkat Jaringan
• Bahasa Inggris (Pasif-Aktif)</textarea>
                    </div>

                    <!-- Sertifikasi & Proyek -->
                    <div>
                        <h3 class="uppercase text-xs tracking-widest font-medium text-slate-500 mb-4">Sertifikasi & Proyek</h3>
                        <textarea id="sertifikasi" rows="4" class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" 
                                  oninput="updatePreview()">• Sertifikat Cisco Networking Academy
• Proyek: Sistem Monitoring Jaringan Sekolah berbasis Web</textarea>
                    </div>
                </div>
            </div>

            <!-- PREVIEW -->
            <div class="lg:col-span-7">
                <div class="preview-header flex justify-between items-center mb-4 px-2 no-print">
                    <h3 class="font-semibold text-slate-700 flex items-center gap-x-2">
                        <i class="fa-solid fa-eye"></i> Pratinjau CV ATS (Tanpa Foto)
                    </h3>
                    <span class="text-xs bg-emerald-100 text-emerald-700 px-4 py-1.5 rounded-3xl">FORMAT A4</span>
                </div>
                
                <div class="preview-wrapper bg-white p-6 rounded-3xl shadow-inner overflow-x-auto">
                    <div id="cv" class="a4-paper mx-auto">
                        <div id="cv-content"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let cvData = {
            nama: "Muhammad Hafis",
            telepon: "0856-1234-5678",
            email: "hafis@example.com",
            alamat: "Paninggaran, Pekalongan, Jawa Tengah",
            linkedin: "linkedin.com/in/hafis",
            ringkasan: "",
            keterampilan: "",
            sertifikasi: ""
        };

        function tambahPengalaman() {
            const container = document.getElementById('pengalaman-container');
            const index = container.children.length;
            const div = document.createElement('div');
            div.className = "border border-slate-100 p-5 rounded-2xl space-y-3";
            div.innerHTML = `
                <input type="text" id="exp-posisi-${index}" placeholder="Posisi / Jabatan" 
                       class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()">
                <input type="text" id="exp-perusahaan-${index}" placeholder="Nama Perusahaan" 
                       class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()">
                <input type="text" id="exp-periode-${index}" placeholder="Periode" 
                       class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()">
                <textarea id="exp-deskripsi-${index}" rows="3" placeholder="Deskripsi tugas & pencapaian" 
                          class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()"></textarea>
            `;
            container.appendChild(div);
            updatePreview();
        }

        function tambahMagang() {
            const container = document.getElementById('magang-container');
            const index = container.children.length;
            const div = document.createElement('div');
            div.className = "border border-slate-100 p-5 rounded-2xl space-y-3";
            div.innerHTML = `
                <input type="text" id="mag-posisi-${index}" placeholder="Posisi Magang" 
                       class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()">
                <input type="text" id="mag-perusahaan-${index}" placeholder="Nama Perusahaan / Instansi" 
                       class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()">
                <input type="text" id="mag-periode-${index}" placeholder="Periode Magang" 
                       class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()">
                <textarea id="mag-deskripsi-${index}" rows="3" placeholder="Deskripsi tugas & pencapaian selama magang" 
                          class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()"></textarea>
            `;
            container.appendChild(div);
            updatePreview();
        }

        function tambahPendidikan() {
            const container = document.getElementById('pendidikan-container');
            const index = container.children.length;
            const div = document.createElement('div');
            div.className = "border border-slate-100 p-5 rounded-2xl space-y-3";
            div.innerHTML = `
                <input type="text" id="pend-nama-${index}" placeholder="Nama Sekolah / Universitas & Jurusan" 
                       class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()">
                <input type="text" id="pend-tahun-${index}" placeholder="Tahun (contoh: 2023 - 2026)" 
                       class="w-full px-5 py-4 border border-slate-200 rounded-3xl focus:border-emerald-500 outline-none" oninput="updatePreview()">
            `;
            container.appendChild(div);
            updatePreview();
        }

        function updatePreview() {
            cvData.nama = document.getElementById('nama').value || "Nama Lengkap";
            cvData.telepon = document.getElementById('telepon').value;
            cvData.email = document.getElementById('email').value;
            cvData.alamat = document.getElementById('alamat').value;
            cvData.linkedin = document.getElementById('linkedin').value;
            cvData.ringkasan = document.getElementById('ringkasan').value;
            cvData.keterampilan = document.getElementById('keterampilan').value;
            cvData.sertifikasi = document.getElementById('sertifikasi').value;

            // Pengalaman Kerja
            let expHTML = '';
            const expContainer = document.getElementById('pengalaman-container');
            Array.from(expContainer.children).forEach((child, i) => {
                const posisi = child.querySelector(`#exp-posisi-${i}`)?.value.trim() || '';
                const perusahaan = child.querySelector(`#exp-perusahaan-${i}`)?.value.trim() || '';
                const periode = child.querySelector(`#exp-periode-${i}`)?.value.trim() || '';
                const deskripsi = child.querySelector(`#exp-deskripsi-${i}`)?.value.trim() || '';
                if (posisi || perusahaan) {
                    expHTML += `<div class="mb-6"><p class="font-semibold">${posisi} ${perusahaan ? `— ${perusahaan}` : ''}</p><p class="text-slate-600 text-sm">${periode}</p><div class="text-slate-700 whitespace-pre-line leading-relaxed mt-2">${deskripsi.replace(/\n/g, '<br>')}</div></div>`;
                }
            });

            // Pengalaman Magang
            let magangHTML = '';
            const magangContainer = document.getElementById('magang-container');
            Array.from(magangContainer.children).forEach((child, i) => {
                const posisi = child.querySelector(`#mag-posisi-${i}`)?.value.trim() || '';
                const perusahaan = child.querySelector(`#mag-perusahaan-${i}`)?.value.trim() || '';
                const periode = child.querySelector(`#mag-periode-${i}`)?.value.trim() || '';
                const deskripsi = child.querySelector(`#mag-deskripsi-${i}`)?.value.trim() || '';
                if (posisi || perusahaan) {
                    magangHTML += `<div class="mb-6"><p class="font-semibold">${posisi} ${perusahaan ? `— ${perusahaan}` : ''}</p><p class="text-slate-600 text-sm">${periode}</p><div class="text-slate-700 whitespace-pre-line leading-relaxed mt-2">${deskripsi.replace(/\n/g, '<br>')}</div></div>`;
                }
            });

            // Pendidikan
            let pendHTML = '';
            const pendContainer = document.getElementById('pendidikan-container');
            Array.from(pendContainer.children).forEach((child, i) => {
                const nama = child.querySelector(`#pend-nama-${i}`)?.value.trim() || '';
                const tahun = child.querySelector(`#pend-tahun-${i}`)?.value.trim() || '';
                if (nama) pendHTML += `<div class="mb-5"><p class="font-semibold">${nama}</p><p class="text-slate-600">${tahun}</p></div>`;
            });

            const contentHTML = `
                <div>
                    <h1 class="text-[28pt] font-bold tracking-tight text-slate-900">${cvData.nama}</h1>
                    <div class="mt-4 flex flex-wrap gap-x-6 gap-y-1 text-[10.6pt] text-slate-600">
                        <span>${cvData.telepon}</span>
                        <span>${cvData.email}</span>
                        <span>${cvData.alamat}</span>
                        ${cvData.linkedin ? `<span class="break-all">${cvData.linkedin}</span>` : ''}
                    </div>
                </div>

                ${cvData.ringkasan ? `<div class="mt-10"><h2 class="section-title">RINGKASAN PROFESIONAL</h2><p class="text-slate-700 leading-relaxed">${cvData.ringkasan}</p></div>` : ''}

                ${expHTML ? `<div class="mt-10"><h2 class="section-title">PENGALAMAN KERJA</h2>${expHTML}</div>` : ''}

                ${magangHTML ? `<div class="mt-10"><h2 class="section-title">PENGALAMAN MAGANG</h2>${magangHTML}</div>` : ''}

                <div class="mt-10"><h2 class="section-title">PENDIDIKAN</h2><div class="mt-4">${pendHTML || '<p class="text-slate-500 italic">Tambahkan pendidikan Anda</p>'}</div></div>

                <div class="mt-10"><h2 class="section-title">KETERAMPILAN</h2><div class="text-slate-700 whitespace-pre-line leading-relaxed mt-4">${cvData.keterampilan.replace(/\n/g, '<br>')}</div></div>

                ${cvData.sertifikasi ? `<div class="mt-10"><h2 class="section-title">SERTIFIKASI & PROYEK</h2><div class="text-slate-700 whitespace-pre-line leading-relaxed mt-4">${cvData.sertifikasi.replace(/\n/g, '<br>')}</div></div>` : ''}
            `;

            document.getElementById('cv-content').innerHTML = contentHTML;
        }

        function printLetter() {
            updatePreview();
            window.print();
        }

        function generatePDF() {
            if (confirm('Simpan sebagai PDF?\n\nTips:\n• Margins = None\n• Centang Background graphics')) {
                printLetter();
            }
        }

        function saveAsImage() {
            const cv = document.getElementById('cv');
            html2canvas(cv, { scale: 3, backgroundColor: '#ffffff' }).then(canvas => {
                const link = document.createElement('a');
                link.download = `CV_ATS_${cvData.nama.replace(/[^a-zA-Z0-9]/g, '_')}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        function autoSaveDraft() {
            localStorage.setItem('dunnakCVDraft_v56_nofoto', JSON.stringify(cvData));
            alert('Draft CV berhasil disimpan!');
        }

        function clearForm() {
            if (confirm('Reset semua data CV?')) location.reload();
        }

        // Inisialisasi
        window.onload = () => {
            tambahPendidikan();
            document.getElementById('pend-nama-0').value = "SMK Nurul Ummah Paninggaran - Teknik Jaringan Komputer dan Telekomunikasi";
            document.getElementById('pend-tahun-0').value = "2023 - 2026";

            tambahPengalaman();
            document.getElementById('exp-posisi-0').value = "Magang IT Support";
            document.getElementById('exp-perusahaan-0').value = "PT. ABC";
            document.getElementById('exp-periode-0').value = "Januari – Maret 2025";
            document.getElementById('exp-deskripsi-0').value = "• Maintenance dan troubleshooting jaringan\n• Instalasi perangkat jaringan\n• Membuat website sekolah";

            tambahMagang();

            updatePreview();
        };
    </script>
</body>
</html>
